
<!-- 引入 ECharts -->

                    {offset: 1, color: 'rgba(84, 112, 198, 0.1)'}
                ])
            },
            markLine: {
                data:[{ yAxis: 0, name: '盈亏平衡点' }]
            }
        }]
    };
    chartProfit.setOption(optionProfit);

    // 监听窗口大小变化自动缩放图表
    window.addEventListener('resize', function() {
        chartReturn.resize();
        chartProfit.resize();

</script>
