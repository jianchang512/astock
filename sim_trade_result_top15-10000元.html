
<!-- 引入 ECharts -->

        },

        }]

    chartProfit.setOption(optionProfit);

    // 监听窗口大小变化自动缩放图表
    window.addEventListener('resize', function() {
        chartReturn.resize();
        chartProfit.resize();
    });
});
</script>
